<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Letters</title>
    <style>
        body {
            background-color: #ffccff;
            color: #660066;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            margin-top: 50px;
        }
        form {
            margin: 20px auto;
            padding: 20px;
            border: 2px solid #ff6699;
            border-radius: 10px;
            background-color: #ffe6f2;
            width: 300px;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }
        button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ff1493;
        }
    </style>
</head>
<body>
    <h1>Anonymous Letters</h1>
    <form action="#" method="post">
        <textarea placeholder="Write your letter..." required></textarea>
        <br>
        <button type="submit">Send</button>
    </form>
</body>
</html>
